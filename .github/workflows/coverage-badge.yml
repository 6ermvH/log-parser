name: Coverage-Badge

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/coverage-badge.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-coverage-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Build coverage badge payload
        run: |
          COVERAGE="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')"
          PERCENT="${COVERAGE%\%}"

          if awk "BEGIN {exit !($PERCENT >= 80)}"; then
            COLOR="brightgreen"
          elif awk "BEGIN {exit !($PERCENT >= 60)}"; then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          mkdir -p .github/badges
          cat > .github/badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${COVERAGE}","color":"${COLOR}"}
          EOF

      - name: Commit and push badge update
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Coverage badge is up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "ci: update coverage badge"
          git push
